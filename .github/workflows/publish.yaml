name: Publish

on:
  workflow_dispatch:
    inputs:
      stage:
        description: 'Semantic versioning stage'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - major
          - minor
          - patch
      scope:
        description: 'Semantic versioning scope'
        required: true
        default: 'auto'
        type: choice
        options:
          - auto
          - breaking
          - feature
          - bugfix

permissions:
  contents: write # for creating tags
  pull-requests: write # for commenting on PRs

jobs:

  tag:
    runs-on: ubuntu-latest
    # if: github.event_name == 'workflow_dispatch'
    # if `workflow_dispatch` and Build workflow is completed
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow == 'Build' && github.event.action == 'completed')

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'jetbrains'
          cache: 'gradle'

      - name: Set tag as environment variable
        run: |
          ./gradlew printSemver | grep 'semver for' | awk '{print $4}'
          echo "LATEST_TAG=$(./gradlew printSemver | grep 'semver for' | awk '{print $4}')" >> $GITHUB_ENV

      - name: Generate and push semver tag
        run: ./gradlew pushSemverTag -Psemver.stage=${{ github.event.inputs.stage }} -Psemver.scope=${{ github.event.inputs.scope }}

  publish:
    runs-on: ubuntu-latest
    needs: tag

    steps:
      - name: Checkout latest tag
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.LATEST_TAG }}

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'jetbrains'

      - name: Build, sign, verify, and publish plugin
        run: ./gradlew buildPlugin signPlugin verifyPlugin publishPlugin -x test
        env:
          LATEST_TAG: ${{ env.LATEST_TAG }}
          CERTIFICATE_CHAIN: ${{ secrets.CCERTIFICATE_CHAIN }}
          PRIVATE_KEY: ${{ secrets.PRIVATE_KEY }}
          PRIVATE_KEY_PASSWORD: ${{ secrets.PRIVATE_KEY_PASSWORD }}
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}